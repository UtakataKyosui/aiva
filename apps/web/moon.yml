language: javascript
dependsOn:
  - shared

tasks:
  dev:
    command: pnpm dev
    deps:
      - ^:build
    local: true
  build:
    command: pnpm build
    deps:
      - ^:build
    inputs:
      - app/**/*
      - src/**/*
      - public/**/*
      - package.json
      - tsconfig.json
      - next.config.ts
      - drizzle.config.ts
    outputs:
      - .next
  test:
    command: pnpm test
    deps:
      - ^:build
    inputs:
      - app/**/*
      - src/**/*
      - tests/**/*
      - package.json
      - tsconfig.json
      - next.config.ts
  lint:
    command: pnpm lint
    inputs:
      - app/**/*
      - src/**/*
      - tests/**/*
      - package.json
      - biome.json
  format:
    command: pnpm format
    local: true
